<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f8;
        }

        .box{

            width:350px;

            margin:100px auto;

            background:white;

            padding:25px;

            border-radius:10px;

            box-shadow:0 0 10px #ccc;

        }

        input{

            width:100%;

            padding:10px;

            margin:10px 0;

        }

        button{

            width:100%;

            padding:10px;

            background:#4CAF50;

            color:white;

            border:none;

            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="box">

<h2>Register</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button>Create Account</button>

</form>

</div>

</body>

</html>
